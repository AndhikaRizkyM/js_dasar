      <label for="">Masukkan nama Kota</label>
      <input type="text" id="kota" />
      <button onclick="jasaPengiriman()">Tes</button>
    </form>

    <!-- memanggil hasil total tarif -->
    <p id="hasil"></p>

    <script>
      function jasaPengiriman() {
        let kota = document.getElementById("kota").value;
        let berat = 10;
        let tarif = 0;

        if (kota === "Bogor") {
          //Jika if kota didalamnya tidak sesuai, maka yang kepanggil tetap tarif yang sudah ditentukan di awal
          tarif = 5000;
        } else if (kota === "Depok") {
          tarif = 5000;
        } else {
          tarif = 7500;
        }
        // membuat hasil perhitungan tarif, dengan menjumlahkan berat dan tarif
        const total = `Total Tarif = ` + berat * tarif;
        document.querySelector("#hasil").innerHTML = total;
        // document.getElementById("hasil").value = total;
      }
