<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belajar DOM (Document Object Modelling)</title>
  </head>
  <body>
    <!-- DOM = Document Object Modelling
     Berbentuk seperti pohon keluarga
     DOM adalah jembatan yang menghubungkan antara HTML ke dalam Javascript -->

    <h1 id="heading1" class="heading1">Selamat Datang</h1>
    <br />
    <script>
      let heading = document.querySelector("h1");

      // Pemanggilan sebuah class html untuk dibuatkan jsnya terdapat dua jenis, yaitu queryselector dan getelement
      let heading1Class = document.querySelector(".heading1");
      let heading1ClassNew = document.getElementsByClassName("heading1");

      // Pemanggilan sebuah id html untuk dibuatkan jsnya terdapat dua jenis, yaitu queryselector dan getelement
      let heading1Id = document.querySelector("#heading1");
      let heading1IdNew = document.getElementById("heading1");

      console.log(heading.innerText); // Text bawaan dari html

      heading.innerText = "Belajar Javascript, saya sudah jago"; // Mengubah teks di dalam headingnya
      heading.innerHTML = "Belajar Javascript, saya sudah <b> Jago </b>"; // Mengubah teks di dalam headingnya

      console.log(heading.innerText); // Text yang sudah diubah oleh DOM JS
    </script>
  </body>
</html>
